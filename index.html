<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>近衛憐のホームページ</title>
  <meta name="description" content="近衛憐の個人ホームページ - ナビゲーション・メモ・ブックマーク">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Paging Navigation -->
  <div class="nav-trigger-area" id="navTriggerArea"></div>
  <div class="nav-arrows" id="navArrows">
    <button class="arrow-btn" id="prevBtn" title="前のページ" aria-label="Previous Page">&#10094;</button>
    <button class="arrow-btn" id="nextBtn" title="次のページ" aria-label="Next Page">&#10095;</button>
  </div>

  <!-- BGM Button -->
  <button class="bgm-btn" id="bgmBtn" title="次のBGMに切り替え">
    <div class="music-bars">
      <span></span><span></span><span></span><span></span>
    </div>
  </button>
  <audio id="bgmAudio" muted autoplay preload="auto"></audio>

  <!-- Section 1: Navigation -->
  <section class="bg-section" id="section1">
    <div class="section-content">
      <div class="page-title fade-in">
        <h1>近衛憐のホームページ</h1>
        <div class="subtitle">Personal Navigation &amp; Resource Center</div>
      </div>
      <div class="glass-card fade-in">
        <div class="section-label"><span class="icon">🧭</span> 个人导航与资源中心</div>
        <div class="nav-grid" id="navGrid">
          <!-- Populated by JS from nav.csv -->
        </div>
      </div>
    </div>
  </section>

  <!-- Section 2: Bookmarks -->
  <section class="bg-section" id="section2">
    <div class="section-content">
      <div class="glass-card fade-in">
        <div class="section-label"><span class="icon">🔗</span> 我的常用网站</div>
        <div class="sites-container" id="sitesContainer">
          <!-- Populated by JS from sites.csv -->
        </div>
      </div>
    </div>
  </section>

  <!-- Section 3: Calendar & Memo -->
  <section class="bg-section" id="section3">
    <div class="section-content">
      <div class="glass-card fade-in">
        <div class="section-label"><span class="icon">📅</span> 备忘录</div>
        <div class="calendar-wrapper" id="calendarWrapper">
          <div class="calendar-header">
            <div class="cal-buttons">
              <button class="cal-btn" id="prevYear" title="上一年">«</button>
              <button class="cal-btn" id="prevMonth" title="上一月">‹</button>
            </div>
            <span class="month-year" id="monthYear"></span>
            <div class="cal-buttons">
              <button class="cal-btn" id="nextMonth" title="下一月">›</button>
              <button class="cal-btn" id="nextYear" title="下一年">»</button>
              <button class="cal-btn today-btn" id="todayBtn">今天</button>
            </div>
          </div>
          <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <!-- Memo Panel -->
        <div class="memo-panel">
          <div class="memo-type-buttons">
            <button class="memo-type-btn" data-type="birthday_solar">🎂 生日（阳历）</button>
            <button class="memo-type-btn" data-type="birthday_lunar">🌙 生日（阴历）</button>
            <button class="memo-type-btn" data-type="monthly">🔁 每月事项</button>
            <button class="memo-type-btn" data-type="once">📌 单次事项</button>
          </div>

          <div class="memo-form" id="memoForm">
            <div class="form-row">
              <input type="text" id="memoTitle" placeholder="事项名称">
            </div>
            <div class="form-row" id="memoDateRow">
              <select id="memoMonth"></select>
              <select id="memoDay"></select>
              <select id="memoYear" style="display:none"></select>
            </div>
            <button class="memo-submit-btn" id="memoSubmit">添加备忘</button>
          </div>

          <!-- Selected day memos -->
          <div class="day-memos" id="dayMemos"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- Section 4: Placeholder -->
  <section class="bg-section" id="section4">
    <div class="section-content placeholder-section">
      <span class="placeholder-text">✦ 第四区域 — 待设计 ✦</span>
    </div>
  </section>

  <!-- Section 5: Placeholder -->
  <section class="bg-section" id="section5">
    <div class="section-content placeholder-section">
      <span class="placeholder-text">✦ 第五区域 — 待设计 ✦</span>
    </div>
  </section>

  <!-- Reminder Modal -->
  <div class="modal-overlay" id="reminderModal">
    <div class="modal-box">
      <h2>📢 近期提醒</h2>
      <div id="reminderList"></div>
      <button class="modal-close-btn" id="modalCloseBtn">我知道了</button>
    </div>
  </div>

  <!-- External Libs -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
